<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruang Rindu Coffee - POS & App</title>
    
    <!-- Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons: Lucide React (Vanilla version) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#4A5D23', // Hijau Tua Ruang Rindu
                        secondary: '#F8F9FA',
                        muted: '#64748B',
                        border: '#E2E8F0',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #F8F9FA;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Utilities */
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Hide logic */
        .hidden-visually { display: none !important; }
    </style>
</head>
<body class="text-slate-800 h-screen overflow-hidden flex flex-col">

    <!-- APP CONTAINER -->
    <div id="root" class="flex-1 h-full flex flex-col relative">
        <!-- Content will be injected here by JavaScript -->
    </div>

    <!-- TOAST NOTIFICATION CONTAINER -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script>
        // ==========================================
        // 1. MOCK DATA & CONFIG (Simulasi Supabase)
        // ==========================================
        
        const PRODUCTS = [
            { id: 1, name: "Kopi Susu Gula Aren", price: 22000, category: "Coffee", image: "https://picsum.photos/seed/coffee1/200/200", desc: "Espresso house blend dengan susu segar dan gula aren organik.", sizes: ['Regular', 'Large'], addons: ['Extra Shot', 'Less Sugar'] },
            { id: 2, name: "Americano", price: 18000, category: "Coffee", image: "https://picsum.photos/seed/coffee2/200/200", desc: "Double shot espresso dengan air panas/dingin.", sizes: ['Hot', 'Ice'], addons: [] },
            { id: 3, name: "Caramel Macchiato", price: 28000, category: "Coffee", image: "https://picsum.photos/seed/coffee3/200/200", desc: "Vanilla syrup, steamed milk, espresso, caramel drizzle.", sizes: ['Regular', 'Large'], addons: ['Extra Caramel'] },
            { id: 4, name: "Matcha Latte", price: 26000, category: "Non-Coffee", image: "https://picsum.photos/seed/matcha/200/200", desc: "Premium Japanese matcha dengan creamy oat milk.", sizes: ['Regular', 'Large'], addons: ['Red Bean'] },
            { id: 5, name: "Croissant Butter", price: 15000, category: "Food", image: "https://picsum.photos/seed/bread/200/200", desc: "Pastry renyah dengan butter Prancis.", sizes: [], addons: ['Warm', 'Chocolate Sauce'] },
            { id: 6, name: "Hazelnut Latte", price: 25000, category: "Coffee", image: "https://picsum.photos/seed/nuts/200/200", desc: "Espresso dengan syrup hazelnut dan susu.", sizes: ['Regular', 'Large'], addons: [] },
        ];

        const formatRupiah = (number) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
        };

        // ==========================================
        // 2. STATE MANAGEMENT (Simulasi Zustand)
        // ==========================================

        const createStore = (initialState) => {
            let state = initialState;
            const listeners = new Set();

            return {
                getState: () => state,
                setState: (partial) => {
                    const nextState = typeof partial === 'function' ? partial(state) : partial;
                    state = { ...state, ...nextState };
                    listeners.forEach(listener => listener(state));
                },
                subscribe: (listener) => {
                    listeners.add(listener);
                    return () => listeners.delete(listener);
                }
            };
        };

        const useStore = createStore({
            view: 'login', // login, home, pos, dashboard
            user: null, // { name, role }
            cart: [], // Array of cart items
            activeModal: null, // 'product', 'payment', 'receipt', null
            selectedProduct: null,
            selectedVariant: null,
            selectedAddons: [],
            paymentMethod: 'cash', // cash, qris, debit
            cashGiven: 0,
            orderHistory: [] // For dashboard
        });

        // ==========================================
        // 3. LOGIC HANDLERS (Business Logic)
        // ==========================================

        const actions = {
            login: (role) => {
                useStore.setState({ 
                    user: { name: role === 'kasir' ? 'Staff Kasir' : 'Budi Santoso', role }, 
                    view: role === 'kasir' ? 'pos' : 'home' 
                });
            },
            
            logout: () => {
                useStore.setState({ user: null, view: 'login', cart: [] });
            },

            openProductModal: (productId) => {
                const product = PRODUCTS.find(p => p.id === productId);
                const defaultSize = product.sizes.length > 0 ? product.sizes[0] : null;
                useStore.setState({ 
                    selectedProduct: product, 
                    selectedVariant: defaultSize,
                    selectedAddons: [],
                    activeModal: 'product' 
                });
            },

            closeModal: () => useStore.setState({ activeModal: null, selectedProduct: null, cashGiven: 0 }),

            toggleAddon: (addon) => {
                const state = useStore.getState();
                const newAddons = state.selectedAddons.includes(addon) 
                    ? state.selectedAddons.filter(a => a !== addon) 
                    : [...state.selectedAddons, addon];
                useStore.setState({ selectedAddons: newAddons });
            },

            addToCart: () => {
                const state = useStore.getState();
                const { selectedProduct, selectedVariant, selectedAddons, cart } = state;
                
                // Hitung harga dinamis
                let basePrice = selectedProduct.price;
                if (selectedVariant === 'Large') basePrice += 5000;
                if (selectedVariant === 'Ice' && selectedProduct.name.includes('Americano')) basePrice += 2000; // Contoh logic
                
                const addonPrice = selectedAddons.length * 2000; // Asumsi harga addon flat utk demo
                const finalPrice = basePrice + addonPrice;

                // Cek item duplikat (persis sama variant & addons)
                const existingIndex = cart.findIndex(item => 
                    item.id === selectedProduct.id && 
                    item.variant === selectedVariant && 
                    JSON.stringify(item.addons) === JSON.stringify(selectedAddons)
                );

                let newCart;
                if (existingIndex >= 0) {
                    newCart = [...cart];
                    newCart[existingIndex].qty += 1;
                } else {
                    newCart = [...cart, {
                        cartId: Date.now(),
                        id: selectedProduct.id,
                        name: selectedProduct.name,
                        price: finalPrice,
                        variant: selectedVariant,
                        addons: selectedAddons,
                        qty: 1
                    }];
                }

                useStore.setState({ cart: newCart, activeModal: null });
                showToast("Berhasil ditambahkan ke keranjang");
            },

            updateCartQty: (cartId, delta) => {
                const state = useStore.getState();
                const newCart = state.cart.map(item => {
                    if (item.cartId === cartId) {
                        return { ...item, qty: Math.max(0, item.qty + delta) };
                    }
                    return item;
                }).filter(item => item.qty > 0);
                useStore.setState({ cart: newCart });
            },

            openPayment: () => {
                useStore.setState({ activeModal: 'payment', paymentMethod: 'cash', cashGiven: 0 });
            },

            setPaymentMethod: (method) => useStore.setState({ paymentMethod: method }),

            setCashGiven: (val) => useStore.setState({ cashGiven: parseFloat(val) || 0 }),

            processPayment: () => {
                const state = useStore.getState();
                const total = state.cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
                
                if (state.paymentMethod === 'cash' && state.cashGiven < total) {
                    showToast("Uang tunai kurang!", "error");
                    return;
                }

                // Simpan ke history (Supabase Insert Simulation)
                const order = {
                    id: `ORD-${Date.now()}`,
                    date: new Date().toISOString(),
                    items: state.cart,
                    total: total,
                    method: state.paymentMethod
                };
                
                useStore.setState({ 
                    orderHistory: [order, ...state.orderHistory],
                    cart: [],
                    activeModal: 'receipt'
                });
            },

            goToDashboard: () => useStore.setState({ view: 'dashboard', activeModal: null })
        };

        // ==========================================
        // 4. UI COMPONENTS (Simulasi React Components)
        // ==========================================

        // --- Helper: Icons ---
        const Icon = (name, size=20) => `<i data-lucide="${name}" width="${size}" height="${size}"></i>`;

        // --- A. LOGIN PAGE ---
        const LoginPage = () => `
            <div class="min-h-screen flex items-center justify-center bg-white p-4">
                <div class="w-full max-w-md bg-white border border-border rounded-2xl shadow-xl p-8 text-center fade-in">
                    <div class="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-green-900/20">
                        ${Icon('coffee', 32)}
                    </div>
                    <h1 class="text-2xl font-bold text-gray-900 mb-2">Ruang Rindu Coffee</h1>
                    <p class="text-muted mb-8">Silakan pilih peran untuk masuk</p>
                    
                    <div class="space-y-3">
                        <button onclick="actions.login('customer')" class="w-full flex items-center justify-center gap-3 bg-white border-2 border-primary text-primary py-3 rounded-xl font-bold hover:bg-green-50 transition-colors">
                            ${Icon('smartphone')}
                            Masuk sebagai Customer
                        </button>
                        <button onclick="actions.login('kasir')" class="w-full flex items-center justify-center gap-3 bg-primary text-white py-3 rounded-xl font-bold hover:bg-green-800 transition-colors shadow-lg shadow-green-900/20">
                            ${Icon('monitor')}
                            Masuk sebagai Kasir
                        </button>
                    </div>
                </div>
            </div>
        `;

        // --- B. CUSTOMER APP (MOBILE) ---
        const CustomerApp = () => `
            <div class="h-full bg-secondary flex flex-col max-w-md mx-auto shadow-2xl overflow-hidden relative border-x border-border">
                <!-- Header -->
                <header class="bg-white px-4 py-4 flex items-center justify-between shadow-sm z-10 sticky top-0">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center text-primary">
                            ${Icon('user', 20)}
                        </div>
                        <div>
                            <p class="text-xs text-muted font-medium">Halo,</p>
                            <h3 class="font-bold text-gray-900 leading-tight">${useStore.getState().user.name}</h3>
                        </div>
                    </div>
                    <button onclick="actions.logout()" class="p-2 text-gray-400 hover:text-red-500">
                        ${Icon('log-out', 20)}
                    </button>
                </header>

                <!-- Content -->
                <div class="flex-1 overflow-y-auto p-4 pb-24">
                    <!-- Promo -->
                    <div class="bg-primary rounded-2xl p-6 text-white mb-6 relative overflow-hidden shadow-lg shadow-green-900/10">
                        <div class="relative z-10">
                            <span class="bg-white/20 backdrop-blur-md px-2 py-1 rounded text-xs font-bold mb-2 inline-block">PROMO</span>
                            <h2 class="text-xl font-bold mb-1">Diskon 20%</h2>
                            <p class="text-sm opacity-90">Kopi Susu Gula Aren khusus hari ini.</p>
                        </div>
                        <i data-lucide="bean" class="absolute -right-4 -bottom-4 w-24 h-24 text-white opacity-10"></i>
                    </div>

                    <!-- Categories -->
                    <div class="flex gap-3 mb-6 overflow-x-auto pb-2 scrollbar-hide">
                        ${['Semua', 'Coffee', 'Non-Coffee', 'Makanan'].map((cat, i) => `
                            <button class="${i === 0 ? 'bg-primary text-white' : 'bg-white text-gray-600 border border-border'} px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap transition-colors shadow-sm">
                                ${cat}
                            </button>
                        `).join('')}
                    </div>

                    <!-- Grid -->
                    <div class="grid grid-cols-2 gap-4">
                        ${PRODUCTS.map(p => `
                            <div onclick="actions.openProductModal(${p.id})" class="bg-white rounded-xl border border-border p-3 shadow-sm cursor-pointer hover:shadow-md transition-shadow">
                                <img src="${p.image}" class="w-full h-28 object-cover rounded-lg mb-3 bg-gray-100" alt="${p.name}">
                                <h4 class="font-bold text-gray-800 text-sm truncate">${p.name}</h4>
                                <p class="text-primary font-bold text-sm mt-1">${formatRupiah(p.price)}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <!-- Floating Cart Button -->
                <button class="absolute bottom-6 left-1/2 -translate-x-1/2 w-3/4 bg-gray-900 text-white py-3 rounded-full flex items-center justify-between px-6 shadow-2xl hover:scale-105 transition-transform active:scale-95">
                    <span class="font-bold text-sm">Lihat Pesanan</span>
                    <span class="bg-white text-gray-900 text-xs font-bold px-2 py-1 rounded-full">${useStore.getState().cart.length} Item</span>
                </button>
            </div>
        `;

        // --- C. POS APP (DESKTOP) ---
        const POSApp = () => {
            const state = useStore.getState();
            const subtotal = state.cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
            const tax = subtotal * 0.1;
            const total = subtotal + tax;

            return `
            <div class="h-full flex flex-col md:flex-row bg-secondary">
                <!-- Left: Menu -->
                <div class="flex-1 h-full flex flex-col overflow-hidden">
                    <div class="h-16 bg-white border-b border-border flex items-center justify-between px-6 shrink-0">
                        <div class="flex items-center gap-2">
                            <span class="bg-primary/10 text-primary p-1.5 rounded-lg">${Icon('coffee')}</span>
                            <h1 class="font-bold text-lg tracking-tight">Ruang Rindu POS</h1>
                        </div>
                        <div class="flex items-center gap-4">
                             <div class="relative">
                                <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-muted"></i>
                                <input type="text" placeholder="Cari menu..." class="pl-9 pr-4 py-2 bg-secondary border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 w-64">
                            </div>
                            <button onclick="actions.goToDashboard()" class="flex items-center gap-2 text-sm font-medium text-muted hover:text-primary">
                                ${Icon('layout-dashboard')} Dashboard
                            </button>
                            <button onclick="actions.logout()" class="text-sm font-medium text-red-500 hover:text-red-700">Logout</button>
                        </div>
                    </div>

                    <!-- Filter Tabs -->
                    <div class="px-6 py-4 flex gap-2 shrink-0">
                        ${['Coffee', 'Non-Coffee', 'Food'].map((cat, i) => `
                            <button class="${i === 0 ? 'bg-primary text-white' : 'bg-white text-gray-600 border border-border hover:bg-gray-50'} px-4 py-1.5 rounded-lg text-sm font-medium transition-all">
                                ${cat}
                            </button>
                        `).join('')}
                    </div>

                    <!-- Products Grid -->
                    <div class="flex-1 overflow-y-auto p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                        ${PRODUCTS.map(p => `
                            <div onclick="actions.openProductModal(${p.id})" class="bg-white rounded-xl border border-border p-4 flex gap-4 cursor-pointer hover:border-primary/50 hover:shadow-md transition-all group">
                                <img src="${p.image}" class="w-20 h-20 rounded-lg object-cover bg-gray-100" alt="${p.name}">
                                <div class="flex-1 flex flex-col justify-center">
                                    <h3 class="font-bold text-gray-800 text-sm group-hover:text-primary transition-colors">${p.name}</h3>
                                    <p class="text-xs text-muted mt-1 line-clamp-1">${p.desc}</p>
                                    <span class="text-primary font-bold mt-2">${formatRupiah(p.price)}</span>
                                </div>
                                <div class="flex items-center justify-center w-8 h-8 rounded-full bg-gray-100 text-gray-400 group-hover:bg-primary group-hover:text-white transition-colors">
                                    ${Icon('plus', 16)}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <!-- Right: Cart Sidebar -->
                <div class="w-full md:w-96 bg-white border-l border-border flex flex-col h-1/3 md:h-full shrink-0 shadow-xl z-20">
                    <div class="p-6 border-b border-border flex justify-between items-center">
                        <h2 class="font-bold text-lg">Order Saat Ini</h2>
                        <span class="text-xs font-mono bg-gray-100 px-2 py-1 rounded text-muted">#ORD-8821</span>
                    </div>

                    <div class="flex-1 overflow-y-auto p-6 space-y-4">
                        ${state.cart.length === 0 ? `
                            <div class="h-full flex flex-col items-center justify-center text-muted">
                                ${Icon('shopping-cart', 48)}
                                <p class="mt-4 text-sm font-medium">Belum ada item dipilih</p>
                            </div>
                        ` : state.cart.map(item => `
                            <div class="flex items-start gap-3 bg-secondary/50 p-3 rounded-xl border border-border/50">
                                <div class="flex-1">
                                    <h4 class="font-bold text-sm text-gray-900">${item.name}</h4>
                                    <div class="text-xs text-muted mt-0.5">
                                        ${item.variant ? `<span class="capitalize">${item.variant}</span>` : ''} 
                                        ${item.addons.length ? `• ${item.addons.join(', ')}` : ''}
                                    </div>
                                    <div class="text-primary font-bold text-sm mt-1">${formatRupiah(item.price)}</div>
                                </div>
                                <div class="flex flex-col items-end gap-2">
                                    <button onclick="actions.updateCartQty(${item.cartId}, -1)" class="text-muted hover:text-red-500">${Icon('minus', 14)}</button>
                                    <span class="text-sm font-semibold w-4 text-center">${item.qty}</span>
                                    <button onclick="actions.updateCartQty(${item.cartId}, 1)" class="text-muted hover:text-primary">${Icon('plus', 14)}</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="p-6 bg-gray-50 border-t border-border">
                        <div class="space-y-2 text-sm mb-4">
                            <div class="flex justify-between text-muted">
                                <span>Subtotal</span>
                                <span class="font-medium text-gray-700">${formatRupiah(subtotal)}</span>
                            </div>
                            <div class="flex justify-between text-muted">
                                <span>Pajak (10%)</span>
                                <span class="font-medium text-gray-700">${formatRupiah(tax)}</span>
                            </div>
                            <div class="flex justify-between text-xl font-bold text-gray-900 pt-2 border-t border-gray-200 mt-2">
                                <span>Total</span>
                                <span class="text-primary">${formatRupiah(total)}</span>
                            </div>
                        </div>
                        <button onclick="actions.openPayment()" class="w-full bg-primary hover:bg-green-800 text-white py-3 rounded-xl font-bold shadow-lg shadow-green-900/20 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2" ${state.cart.length === 0 ? 'disabled' : ''}>
                            <span>Bayar Sekarang</span>
                            ${Icon('arrow-right')}
                        </button>
                    </div>
                </div>
            </div>
        `};

        // --- D. DASHBOARD (KASIR) ---
        const Dashboard = () => {
            const history = useStore.getState().orderHistory;
            const totalSales = history.reduce((acc, ord) => acc + ord.total, 0);

            return `
            <div class="min-h-screen bg-secondary p-8 fade-in">
                <div class="max-w-6xl mx-auto">
                    <div class="flex items-center justify-between mb-8">
                        <div class="flex items-center gap-4">
                            <button onclick="useStore.setState({view: 'pos'})" class="p-2 bg-white border border-border rounded-lg text-muted hover:text-primary hover:border-primary">
                                ${Icon('arrow-left')}
                            </button>
                            <h1 class="text-2xl font-bold text-gray-900">Dashboard Kasir</h1>
                        </div>
                        <button onclick="actions.logout()" class="text-red-500 font-medium text-sm hover:underline">Logout</button>
                    </div>

                    <!-- Stats Cards -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="bg-white p-6 rounded-2xl border border-border shadow-sm">
                            <div class="flex items-center justify-between mb-4">
                                <h3 class="font-medium text-muted">Total Penjualan</h3>
                                <div class="p-2 bg-green-100 rounded-lg text-primary">${Icon('dollar-sign')}</div>
                            </div>
                            <p class="text-3xl font-bold text-gray-900">${formatRupiah(totalSales)}</p>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border border-border shadow-sm">
                            <div class="flex items-center justify-between mb-4">
                                <h3 class="font-medium text-muted">Total Order</h3>
                                <div class="p-2 bg-blue-100 rounded-lg text-blue-600">${Icon('shopping-bag')}</div>
                            </div>
                            <p class="text-3xl font-bold text-gray-900">${history.length}</p>
                        </div>
                        <div class="bg-white p-6 rounded-2xl border border-border shadow-sm">
                            <div class="flex items-center justify-between mb-4">
                                <h3 class="font-medium text-muted">Item Terjual</h3>
                                <div class="p-2 bg-purple-100 rounded-lg text-purple-600">${Icon('coffee')}</div>
                            </div>
                            <p class="text-3xl font-bold text-gray-900">
                                ${history.reduce((acc, ord) => acc + ord.items.reduce((sum, i) => sum + i.qty, 0), 0)}
                            </p>
                        </div>
                    </div>

                    <!-- History Table -->
                    <div class="bg-white rounded-2xl border border-border shadow-sm overflow-hidden">
                        <div class="px-6 py-4 border-b border-border">
                            <h3 class="font-bold text-gray-900">Riwayat Transaksi</h3>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm text-gray-600">
                                <thead class="bg-gray-50 text-xs uppercase font-medium text-muted">
                                    <tr>
                                        <th class="px-6 py-3">Order ID</th>
                                        <th class="px-6 py-3">Waktu</th>
                                        <th class="px-6 py-3">Items</th>
                                        <th class="px-6 py-3">Metode</th>
                                        <th class="px-6 py-3 text-right">Total</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-border">
                                    ${history.length === 0 ? `
                                        <tr><td colspan="5" class="px-6 py-8 text-center text-muted">Belum ada transaksi</td></tr>
                                    ` : history.map(ord => `
                                        <tr>
                                            <td class="px-6 py-4 font-medium text-gray-900">${ord.id}</td>
                                            <td class="px-6 py-4">${new Date(ord.date).toLocaleTimeString()}</td>
                                            <td class="px-6 py-4">${ord.items.map(i => `${i.qty}x ${i.name}`).join(', ')}</td>
                                            <td class="px-6 py-4"><span class="capitalize px-2 py-1 bg-gray-100 rounded text-xs">${ord.method}</span></td>
                                            <td class="px-6 py-4 text-right font-bold text-primary">${formatRupiah(ord.total)}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            `;
        }

        // --- E. MODALS (Shared) ---
        const Modals = () => {
            const state = useStore.getState();
            
            // 1. Product Customization Modal
            if (state.activeModal === 'product' && state.selectedProduct) {
                const p = state.selectedProduct;
                
                // Hitung harga sementara di modal
                let modalPrice = p.price;
                if (state.selectedVariant === 'Large') modalPrice += 5000;
                if (state.selectedVariant === 'Ice' && p.name.includes('Americano')) modalPrice += 2000;
                modalPrice += state.selectedAddons.length * 2000;

                return `
                <div class="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/50 backdrop-blur-sm fade-in" onclick="actions.closeModal()">
                    <div class="bg-white w-full max-w-md rounded-t-2xl sm:rounded-2xl p-6 shadow-2xl slide-up" onclick="event.stopPropagation()">
                        <div class="flex justify-between items-start mb-4">
                            <img src="${p.image}" class="w-24 h-24 rounded-xl object-cover" alt="${p.name}">
                            <div class="flex-1 ml-4">
                                <h2 class="text-xl font-bold text-gray-900">${p.name}</h2>
                                <p class="text-muted text-sm mt-1 line-clamp-2">${p.desc}</p>
                                <h3 class="text-lg font-bold text-primary mt-2">${formatRupiah(modalPrice)}</h3>
                            </div>
                            <button onclick="actions.closeModal()" class="p-1 text-muted hover:text-gray-900">${Icon('x')}</button>
                        </div>

                        <!-- Size Options -->
                        ${p.sizes.length > 0 ? `
                        <div class="mb-6">
                            <label class="block text-sm font-bold text-gray-700 mb-2">Pilih Ukuran</label>
                            <div class="flex gap-3">
                                ${p.sizes.map(size => `
                                    <button onclick="useStore.setState({selectedVariant: '${size}'})" 
                                        class="flex-1 py-2 rounded-lg border text-sm font-medium transition-all ${state.selectedVariant === size ? 'border-primary bg-primary/5 text-primary' : 'border-gray-200 text-gray-600 hover:bg-gray-50'}">
                                        ${size}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                        ` : ''}

                        <!-- Addons -->
                        ${p.addons.length > 0 ? `
                        <div class="mb-8">
                            <label class="block text-sm font-bold text-gray-700 mb-2">Tambahan</label>
                            <div class="flex flex-wrap gap-2">
                                ${p.addons.map(addon => `
                                    <button onclick="actions.toggleAddon('${addon}')"
                                        class="px-3 py-2 rounded-lg border text-sm font-medium transition-all ${state.selectedAddons.includes(addon) ? 'border-primary bg-primary text-white shadow-md' : 'border-gray-200 text-gray-600 hover:bg-gray-50'}">
                                        ${addon} (+2k)
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                        ` : ''}

                        <button onclick="actions.addToCart()" class="w-full bg-primary text-white py-3 rounded-xl font-bold shadow-lg hover:bg-green-800 transition-all">
                            Tambah ke Keranjang - ${formatRupiah(modalPrice)}
                        </button>
                    </div>
                </div>
                `;
            }

            // 2. Payment Modal
            if (state.activeModal === 'payment') {
                const subtotal = state.cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
                const tax = subtotal * 0.1;
                const total = subtotal + tax;
                const change = state.cashGiven - total;

                return `
                <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm fade-in" onclick="actions.closeModal()">
                    <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh] slide-up" onclick="event.stopPropagation()">
                        <div class="p-6 border-b border-border flex justify-between items-center bg-gray-50">
                            <h3 class="font-bold text-lg text-gray-900">Pembayaran</h3>
                            <button onclick="actions.closeModal()" class="text-muted hover:text-gray-900">${Icon('x')}</button>
                        </div>
                        
                        <div class="p-8">
                            <div class="text-center mb-8">
                                <p class="text-muted text-sm mb-1">Total Tagihan</p>
                                <h2 class="text-4xl font-extrabold text-primary tracking-tight">${formatRupiah(total)}</h2>
                            </div>

                            <!-- Payment Methods -->
                            <div class="grid grid-cols-3 gap-4 mb-8">
                                ${[
                                    {id: 'cash', label: 'Tunai', icon: 'banknote'}, 
                                    {id: 'qris', label: 'QRIS', icon: 'qr-code'}, 
                                    {id: 'debit', label: 'Debit', icon: 'credit-card'}
                                ].map(m => `
                                    <button onclick="actions.setPaymentMethod('${m.id}')"
                                        class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl border-2 transition-all ${state.paymentMethod === m.id ? 'border-primary bg-primary/5' : 'border-gray-200 hover:bg-gray-50'}">
                                        ${Icon(m.icon, 24)}
                                        <span class="font-medium text-sm ${state.paymentMethod === m.id ? 'text-primary' : 'text-gray-600'}">${m.label}</span>
                                    </button>
                                `).join('')}
                            </div>

                            <!-- Cash Input -->
                            ${state.paymentMethod === 'cash' ? `
                            <div class="space-y-4 animate-fade-in">
                                <label class="block text-sm font-bold text-gray-700">Uang Diterima</label>
                                <div class="relative">
                                    <span class="absolute left-4 top-3.5 text-gray-500 font-bold">Rp</span>
                                    <input type="number" value="${state.cashGiven || ''}" oninput="actions.setCashGiven(this.value)" 
                                        class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-border rounded-xl text-xl font-bold text-right focus:outline-none focus:ring-2 focus:ring-primary/20" placeholder="0">
                                </div>
                                <div class="grid grid-cols-4 gap-2">
                                    ${[10000, 20000, 50000, 100000].map(n => `
                                        <button onclick="actions.setCashGiven(${n})" class="py-2 bg-white border border-border rounded-lg text-xs font-bold hover:bg-gray-50 text-gray-600">
                                            ${(n/1000)}k
                                        </button>
                                    `).join('')}
                                </div>
                                ${state.cashGiven >= total ? `
                                    <div class="bg-green-50 p-4 rounded-xl flex justify-between items-center border border-green-100">
                                        <span class="font-bold text-green-800">Kembalian</span>
                                        <span class="font-bold text-green-700 text-lg">${formatRupiah(change)}</span>
                                    </div>
                                ` : ''}
                            </div>
                            ` : `
                            <div class="text-center py-8 text-muted bg-gray-50 rounded-xl border border-dashed border-gray-300">
                                <i data-lucide="scan-face" class="mx-auto w-12 h-12 opacity-20"></i>
                                <p class="mt-2 text-sm">Siapkan ${state.paymentMethod === 'qris' ? 'QR Code' : 'Kartu Debit'}</p>
                            </div>
                            `}
                        </div>

                        <div class="p-6 border-t border-border bg-gray-50">
                            <button onclick="actions.processPayment()" class="w-full bg-gray-900 hover:bg-black text-white py-3.5 rounded-xl font-bold shadow-lg transition-all flex items-center justify-center gap-2">
                                <span>Proses Pembayaran</span>
                                ${Icon('check-circle')}
                            </button>
                        </div>
                    </div>
                </div>
                `;
            }

            // 3. Receipt Modal
            if (state.activeModal === 'receipt') {
                const lastOrder = state.orderHistory[0];
                return `
                <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm fade-in">
                    <div class="bg-white w-full max-w-sm rounded-2xl p-0 shadow-2xl slide-up overflow-hidden relative">
                        <div class="bg-primary h-24 rounded-b-[40px] flex items-center justify-center absolute top-0 w-full z-0"></div>
                        
                        <div class="relative z-10 pt-16 px-6 pb-8 text-center">
                            <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto shadow-lg mb-4">
                                <i data-lucide="check" class="w-8 h-8 text-primary"></i>
                            </div>
                            <h2 class="text-xl font-bold text-gray-900 mb-1">Pembayaran Berhasil!</h2>
                            <p class="text-muted text-sm mb-6">Terima kasih, pesanan sedang disiapkan.</p>

                            <div class="bg-white border border-gray-100 rounded-xl p-4 text-left shadow-sm mb-6">
                                <div class="flex justify-between text-sm mb-2">
                                    <span class="text-muted">ID Order</span>
                                    <span class="font-mono font-bold text-gray-900">${lastOrder.id}</span>
                                </div>
                                <div class="flex justify-between text-sm mb-2">
                                    <span class="text-muted">Metode</span>
                                    <span class="font-bold capitalize text-gray-900">${lastOrder.method}</span>
                                </div>
                                <div class="border-t border-dashed border-gray-200 my-3 pt-3 flex justify-between items-center">
                                    <span class="font-bold text-gray-900">Total Bayar</span>
                                    <span class="font-bold text-lg text-primary">${formatRupiah(lastOrder.total)}</span>
                                </div>
                            </div>

                            <button onclick="actions.closeModal()" class="w-full border border-border text-gray-700 font-bold py-3 rounded-xl hover:bg-gray-50 transition-colors">
                                Transaksi Baru
                            </button>
                        </div>
                    </div>
                </div>
                `;
            }

            return '';
        };

        // --- MAIN RENDERER ---
        const render = () => {
            const state = useStore.getState();
            const root = document.getElementById('root');
            
            let content = '';
            switch (state.view) {
                case 'login': content = LoginPage(); break;
                case 'home': content = CustomerApp(); break;
                case 'pos': content = POSApp(); break;
                case 'dashboard': content = Dashboard(); break;
            }

            root.innerHTML = content + Modals();
            lucide.createIcons();
        };

        // --- TOAST UTILITY ---
        const showToast = (message, type = 'success') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `px-4 py-3 rounded-lg shadow-lg text-sm font-bold text-white flex items-center gap-2 pointer-events-auto transform transition-all duration-300 translate-y-10 opacity-0 ${type === 'error' ? 'bg-red-500' : 'bg-gray-900'}`;
            toast.innerHTML = `${type === 'error' ? Icon('alert-circle', 16) : Icon('check-circle', 16)} ${message}`;
            
            container.appendChild(toast);
            
            // Animate in
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            });

            // Remove after 3s
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        // --- INIT ---
        useStore.subscribe(render);
        render(); // Initial Render

    </script>
</body>
</html>
